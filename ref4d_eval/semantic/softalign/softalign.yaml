encoder:

  model_name_or_path: checkpoints/e5-large-v2
  device: cuda
  dtype: bf16
  batch_size: 128
  max_length_query: 64
  max_length_passage: 128
  query_prefix: "query: "
  passage_prefix: "passage: "
  cache_dir:
  local_files_only: true
  revision:
  trust_remote_code: false

preproc:
  lowercase: true
  strip: true
  canonical_hyphen: true
  drop_nonalpha: true
  drop_short_token_len: 1

repr:
  include_name_in_set: false
  name_weight_in_set: 1.0
  name_channel_purpose: query
  set_channel_purpose: passage
  key_weight:
    pattern: 1.7
    pose: 1.7
    state: 1.7
    position: 1.5
    color: 1.5
    texture: 1.3
    material: 1.3
    size: 1.3
    age: 1.3
    sex: 1.3
    action: 1.3
    orientation: 1.0
    facing-direction: 1.0
    object-part: 1.0
    tool-or-instrument: 1.0
    equipment: 1.0
    species-or-breed: 1.3
    vehicle-type: 1.0
    food-type: 1.3
    art-medium: 1.0
    style: 1.0
    weather: 1.0
    lighting: 1.0
    scene: 1.0
    camera-view: 1.0
    printed-text: 1.0
    brand-or-logo: 1.0
    number-or-id: 1.0

sim:
  tau0: 0.5
  combine: weighted  
  w_name: 0.4
  w_set: 0.6

matching:
  algorithm: hungarian
  min_score: 0.6

semantic_aggregator:
  weights:
    catcov: 1.063877
    aic: 0.767601
    hal: 0.622006
  bias: -1.240682
