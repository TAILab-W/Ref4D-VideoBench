name: ref4d_motion
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # === Base environment ===
  - python=3.12
  - pip
  - ffmpeg               # Video I/O (used with decord/av/opencv)

  # === Scientific computing / image processing ===
  - numpy=2.2
  - scipy=1.13
  - scikit-image=0.25
  - pandas=2.2
  - matplotlib=3.10
  - pillow=11.0
  - pyyaml
  - tqdm
  - requests
  - rich
  - tabulate

  # === PyTorch + CUDA (for PTLFlow / SAM / GroundingDINO, etc.) ===
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=11.8

  # === Install remaining packages with pip ===
  - pip:
      # --- Video I/O + image processing ---
      - opencv-contrib-python-headless==4.12.0.88
      - decord==0.6.0
      - av==16.0.1
      - imageio==2.37.0
      - mediapy==1.2.4

      # --- Scoring / numerical utilities ---
      - dtaidistance==2.3.12
      - piq==0.8.0
      - imagehash==4.3.1
      - kornia==0.8.1
      - kornia-rs==0.1.9
      - lmdb==1.7.5
      - loguru==0.7.3
      - supervision==0.26.1

      # --- Scene detection ---
      - ptlflow==0.4.1
      - scenedetect==0.6.7

      # --- Object detection / segmentation / subject mask support ---
      - pycocotools==2.0.10
      - huggingface-hub==0.35.3
      - transformers==4.57.0
      - timm==1.0.19
      - addict==2.4.0
      - yapf==0.40.2
      - safetensors==0.6.2
      - tokenizers==0.22.1
      - segment-anything==1.0
      - iopath==0.1.10

      # --- TAPIR-required stack (JAX + Haiku + Optax, etc.) ---
      - absl-py==2.3.1
      - chex==0.1.86
      - dm-haiku==0.0.12
      - optax==0.2.3
      - ml-collections==1.1.0
      - ml-dtypes==0.5.3
      - etils==1.13.0
      - orbax-checkpoint==0.11.25
      - tensorstore==0.1.77
      - jax==0.7.2
      - jaxlib==0.7.2
      - jax-cuda12-pjrt==0.7.2
      - jax-cuda12-plugin==0.7.2
      - grpcio==1.75.0
      - h5py==3.12.1
      - dm-tree
      - einshape

      # --- Training logs / configuration (dependencies of the official TAPIR code) ---
      - tensorboard==2.18.0
      - tensorboard-data-server==0.7.2
      - tensorboardX==2.6.4
      - hydra-core==1.3.2
      - jsonargparse==4.41.0
      - protobuf==6.32.1
